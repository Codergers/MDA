name: test

on:
  push:
    branches:
      - "main"
    paths:
      - ".github/workflows/test.yml"
      - "assets/**"
      - "tests/**"
      - "**.py"
  pull_request:
    branches:
      - "main"
    paths:
      - ".github/workflows/test.yml"
      - "assets/**"
      - "tests/**"
      - "**.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  maa-tools-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Use Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run maa-tools test
        run: npx @nekosu/maa-tools test

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: tests/maatools
